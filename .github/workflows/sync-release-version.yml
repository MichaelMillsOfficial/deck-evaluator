name: Sync Release Version to package.json

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Extract version from release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading "v" if present (package.json stores bare semver)
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version "${{ steps.tag.outputs.version }}" --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.event.release.tag_name }}"
          git push
